<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LPG Mobile</title>
<link rel="manifest" crossorigin="use-credentials">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b1929">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#0b1929;--card:#122238;--card2:#1a3050;--border:#243b55;
  --text:#e4ecf5;--muted:#6b8aab;--accent:#2e8bff;--green:#22c55e;
  --red:#ef4444;--orange:#f59e0b;--purple:#a47af5;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow-x:hidden;min-height:100dvh;}
button{cursor:pointer;font-family:inherit;border:none;outline:none;}
input,select{font-family:inherit;outline:none;}

/* ═══ Header ═══ */
.hdr{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#0b1929,#132d4a);
  padding:12px 16px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.3);}
.hdr-title{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:#fff;letter-spacing:2px;}
.hdr-sub{font-size:10px;color:var(--muted);letter-spacing:1px;}
.hdr-led{width:8px;height:8px;border-radius:50%;margin-left:auto;background:var(--red);}
.hdr-led.ok{background:var(--green);animation:pulse 2s ease infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ═══ Bottom Nav ═══ */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:linear-gradient(180deg,#0d1f35,#0b1929);
  border-top:1px solid var(--border);display:flex;
  padding:6px 0 calc(6px + var(--safe-b));box-shadow:0 -2px 12px rgba(0,0,0,.4);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 0;background:none;color:var(--muted);font-size:9px;font-weight:600;letter-spacing:.5px;transition:color .2s;}
.bnav-btn.on{color:var(--accent);}
.bnav-btn .bi{font-size:20px;line-height:1;}

/* ═══ Pages ═══ */
.page{display:none;padding:12px 14px 80px;min-height:calc(100dvh - 60px);animation:fadeIn .25s ease;}
.page.on{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ═══ Section Title ═══ */
.stitle{font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;color:var(--accent);
  letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;}

/* ═══ Station Cards ═══ */
.st-card{background:var(--card);border:1px solid var(--border);border-radius:12px;
  margin-bottom:10px;overflow:hidden;transition:border-color .3s,box-shadow .3s;}
.st-card.calling{border-color:#c05800;box-shadow:0 0 12px rgba(231,111,0,.15);}
.st-card.loading{border-color:var(--green);box-shadow:0 0 12px rgba(34,197,94,.15);}
.st-card.wait{border-color:var(--red);box-shadow:0 0 12px rgba(239,68,68,.15);}
.st-head{display:flex;align-items:center;padding:10px 14px;gap:8px;
  background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.05);}
.st-num{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;letter-spacing:2px;}
.st-badge{font-size:9px;font-weight:700;padding:3px 10px;border-radius:12px;letter-spacing:1px;text-transform:uppercase;}
.st-badge.empty{background:rgba(107,138,171,.15);color:var(--muted);}
.st-badge.calling{background:rgba(231,111,0,.15);color:#f59e0b;}
.st-badge.loading{background:rgba(34,197,94,.15);color:var(--green);}
.st-badge.wait{background:rgba(239,68,68,.15);color:var(--red);}
.st-body{padding:10px 14px;}
.st-empty{text-align:center;padding:16px;color:var(--muted);font-size:12px;font-style:italic;}
.st-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;border-bottom:1px solid rgba(255,255,255,.04);}
.st-lbl{color:var(--muted);font-size:10px;font-weight:600;min-width:70px;}
.st-val{font-weight:600;text-align:right;flex:1;}
.st-actions{display:flex;gap:6px;padding:8px 14px 12px;flex-wrap:wrap;}
.st-abtn{flex:1;min-width:0;padding:8px 0;border-radius:8px;font-size:11px;font-weight:700;
  text-align:center;letter-spacing:.5px;transition:transform .1s;}
.st-abtn:active{transform:scale(.96);}
.st-abtn.swap{background:linear-gradient(135deg,#2e8bff,#1a6dd4);color:#fff;}
.st-abtn.edit{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;}

/* ═══ Search Input ═══ */
.sinp{width:100%;padding:10px 14px;font-size:14px;border-radius:10px;border:1.5px solid var(--border);
  background:var(--card);color:var(--text);transition:border-color .2s;}
.sinp:focus{border-color:var(--accent);}
.sinp::placeholder{color:var(--muted);}

/* ═══ Cert Results ═══ */
.cert-item{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;margin-bottom:8px;}
.cert-name{font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px;}
.cert-sub{font-size:10px;color:var(--muted);}
.cert-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.cert-tag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;display:inline-flex;align-items:center;gap:3px;}
.cert-tag.ok{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25);}
.cert-tag.exp{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25);}

/* ═══ Swap Modal ═══ */
.modal-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center;}
.modal-bg.on{display:flex;}
.modal-sheet{background:var(--card);border-radius:18px 18px 0 0;width:100%;max-width:480px;
  max-height:85dvh;overflow-y:auto;padding:20px 18px calc(20px + var(--safe-b));
  animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal-title{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:var(--accent);
  letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.modal-close{margin-left:auto;background:var(--card2);color:var(--muted);width:30px;height:30px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;}

/* ═══ Edit Form ═══ */
.eform{display:flex;flex-direction:column;gap:10px;}
.eform label{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:3px;}
.eform input,.eform select{width:100%;padding:10px 12px;font-size:14px;border-radius:8px;
  border:1.5px solid var(--border);background:var(--card2);color:var(--text);}
.eform input:focus,.eform select:focus{border-color:var(--accent);}
.eform .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-save{width:100%;padding:14px;border-radius:10px;font-family:'Oswald',sans-serif;
  font-size:15px;font-weight:700;letter-spacing:1.5px;color:#fff;
  background:linear-gradient(135deg,var(--accent),#1a6dd4);margin-top:6px;transition:transform .1s;}
.btn-save:active{transform:scale(.97);}
.btn-cancel{width:100%;padding:10px;border-radius:8px;background:var(--card2);color:var(--muted);
  font-size:12px;font-weight:600;margin-top:4px;}

/* ═══ Toast ═══ */
.mtoast{position:fixed;top:16px;left:16px;right:16px;z-index:999;padding:12px 16px;border-radius:10px;
  font-size:12px;font-weight:600;text-align:center;transform:translateY(-100px);opacity:0;
  transition:all .3s ease;pointer-events:none;}
.mtoast.show{transform:translateY(0);opacity:1;}
.mtoast.ok{background:#0d3320;color:var(--green);border:1px solid rgba(34,197,94,.3);}
.mtoast.er{background:#3b1111;color:var(--red);border:1px solid rgba(239,68,68,.3);}

/* ═══ Assign Results ═══ */
.asr-item{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;margin-bottom:8px;transition:border-color .2s;}
.asr-item:active{border-color:var(--accent);}
.asr-head{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.asr-plate{font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;}
.asr-driver{font-size:12px;font-weight:600;}
.asr-cust{font-size:11px;color:var(--muted);font-weight:600;}
.asr-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.asr-tag{font-size:9px;font-weight:600;padding:2px 7px;border-radius:5px;display:inline-block;}
.asr-tag.qty{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25);}
.asr-tag.noqty{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25);}
.asr-tag.do{background:rgba(46,139,255,.1);color:var(--accent);border:1px solid rgba(46,139,255,.2);}
.asr-tag.type{background:rgba(164,122,245,.1);color:var(--purple);border:1px solid rgba(164,122,245,.2);}
.asr-tag.done{background:rgba(107,138,171,.1);color:var(--muted);border:1px solid rgba(107,138,171,.2);}
.asr-tag.warn{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);}
.asr-excluded{padding:8px 12px;font-size:10px;color:var(--muted);border-bottom:1px solid rgba(255,255,255,.04);}
.asr-station-pick{display:flex;gap:6px;margin-top:8px;}
@keyframes asrBlink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(1.08)}}
.asr-item.warn-flash .asr-tag.warn,.asr-item.warn-flash .asr-tag.noqty{animation:asrBlink .5s ease-in-out 6;}
.asr-item.warn-flash{border-color:var(--red)!important;box-shadow:0 0 0 2px rgba(239,68,68,.3);}
.asr-assign-btn{width:100%;margin-top:10px;padding:12px;border:none;border-radius:8px;font-weight:700;font-size:13px;background:rgba(46,139,255,.18);color:var(--accent);border:1px solid rgba(46,139,255,.35);cursor:pointer;}
.asr-assign-btn:disabled{opacity:.4;cursor:not-allowed;}
.asr-assign-btn.pending{background:rgba(239,68,68,.2);color:var(--red);border-color:rgba(239,68,68,.5);}
.asr-st-btn{flex:1;padding:8px;border-radius:8px;font-family:'Oswald',sans-serif;font-size:12px;
  font-weight:700;letter-spacing:1px;text-align:center;background:var(--card2);color:var(--muted);
  border:1.5px solid var(--border);transition:all .15s;}
.asr-st-btn:active{transform:scale(.96);}
.asr-st-btn.avail{background:rgba(46,139,255,.08);color:var(--accent);border-color:rgba(46,139,255,.3);}

/* ═══ Swap Selector ═══ */
.swap-opt{display:flex;align-items:center;gap:10px;padding:12px;background:var(--card2);
  border:1.5px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:border-color .2s;}
.swap-opt:active{border-color:var(--accent);}
.swap-opt.sel{border-color:var(--accent);background:rgba(46,139,255,.08);}
.swap-num{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:var(--accent);width:30px;text-align:center;}
.swap-info{flex:1;font-size:11px;line-height:1.5;}
.swap-info b{font-size:12px;color:var(--text);}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div>
    <div class="hdr-title">⚡ LPG MOBILE</div>
    <div class="hdr-sub">HYOSUNG VINA CHEMICALS</div>
  </div>
  <div class="hdr-led" id="led"></div>
</div>

<!-- Page: Stations -->
<div class="page on" id="pg-st">
  <div class="stitle">⚡ 4 Trạm Nạp</div>
  <div id="st-list"></div>
</div>

<!-- Assign tab removed — search embedded in station cards -->

<!-- Page: Today Plan (read-only) -->
<div class="page" id="pg-plan">
  <div class="stitle">📋 Kế Hoạch Hôm Nay</div>
  <input class="sinp" id="plan-q" placeholder="Lọc: biển số, tài xế, DO, khách..." oninput="mPlanRender()">
  <div id="plan-summary" style="font-size:11px;color:var(--muted);margin:8px 2px 4px;display:flex;gap:10px;flex-wrap:wrap"></div>
  <div id="plan-list" style="margin-top:6px"></div>
</div>

<!-- Page: Cert Check -->
<div class="page" id="pg-cert">
  <div class="stitle">🔍 Kiểm Tra Giấy Tờ</div>
  <input class="sinp" id="cert-q" placeholder="Nhập biển số xe hoặc tên tài xế..." oninput="mCertSearch(this.value)">
  <div id="cert-res" style="margin-top:10px"></div>
</div>

<!-- Page: Edit (placeholder, content filled dynamically) -->
<div class="page" id="pg-edit">
  <div id="edit-content"></div>
</div>

<!-- Bottom Nav -->
<div class="bnav">
  <button class="bnav-btn on" id="nav-st" onclick="mNav('st')"><span class="bi">⚡</span>Trạm</button>
  <button class="bnav-btn" id="nav-plan" onclick="mNav('plan')"><span class="bi">📋</span>Kế hoạch</button>
  <button class="bnav-btn" id="nav-cert" onclick="mNav('cert')"><span class="bi">🔍</span>Giấy tờ</button>
</div>

<!-- Swap Modal -->
<div class="modal-bg" id="modal-swap">
  <div class="modal-sheet" id="modal-swap-body"></div>
</div>

<!-- Edit Modal -->
<div class="modal-bg" id="modal-edit">
  <div class="modal-sheet" id="modal-edit-body"></div>
</div>

<!-- Cert Edit Modal -->
<div class="modal-bg" id="modal-cert-edit">
  <div class="modal-sheet" id="modal-cert-edit-body"></div>
</div>

<!-- Toast -->
<div class="mtoast" id="mtoast"></div>

<script>
/* ══════════════════════════════════════════════════════════════
   LPG MOBILE — Standalone mobile companion
   Same Firebase as desktop → realtime sync
══════════════════════════════════════════════════════════════ */

// ═══ Firebase Init ═══
firebase.initializeApp({
  apiKey: 'AIzaSyDBqAzRo1FpDt7UmzKa5jkQfCOOMw0vFSc',
  databaseURL: 'https://tlb-call-default-rtdb.firebaseio.com',
  projectId: 'tlb-call',
  authDomain: 'tlb-call.firebaseapp.com',
  storageBucket: 'tlb-call.appspot.com'
});
const FD = firebase.database();
let connected = false;
FD.ref('.info/connected').on('value', s => {
  connected = s.val() === true;
  document.getElementById('led').className = 'hdr-led' + (connected ? ' ok' : '');
});

// ═══ Data Store ═══
const ST = { 1:{}, 2:{}, 3:{}, 4:{} };
const FLEET = { lt:[], dk:[], rm:[], dr:[] };
let TK_CFG = { tk1:{}, tk2:{} };

// ═══ Navigation ═══
function mNav(pg) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('on'));
  document.getElementById('pg-' + pg).classList.add('on');
  document.getElementById('nav-' + pg).classList.add('on');
  if(pg==='plan' && typeof mPlanRender==='function') mPlanRender();
}

// ═══ Toast ═══
let _toastTimer;
function mToast(msg, type) {
  const el = document.getElementById('mtoast');
  el.textContent = msg;
  el.className = 'mtoast show ' + (type || 'ok');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ═══ Helpers ═══
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
function normDO(d) { return String(d||'').replace(/[,\s]/g,'').replace(/^0+/,'').trim(); }
function doMatch(a,b) { return normDO(a) === normDO(b) && normDO(a) !== ''; }
function stripTZ(v) { var n=parseFloat(v); return isNaN(n)?'':n%1===0?String(n):n.toFixed(3).replace(/0+$/,'').replace(/\.$/,''); }

// ═══════════════════════════════════════════════════════════
// STATIONS — Realtime cards
// ═══════════════════════════════════════════════════════════

function stListen() {
  for (let i = 1; i <= 4; i++) {
    FD.ref('stations/' + i).on('value', snap => {
      ST[i] = snap.val() || {};
      renderStations();
    });
  }
  FD.ref('tank_config').on('value', snap => {
    const v = snap.val() || {};
    TK_CFG.tk1 = v.tk1 || {};
    TK_CFG.tk2 = v.tk2 || {};
  });
}

function renderStations() {
  const el = document.getElementById('st-list');
  let h = '';
  for (let i = 1; i <= 4; i++) {
    const s = ST[i] || {};
    const st = s.status || 'empty';
    const cls = st === 'empty' ? '' : st;
    const badgeTxt = st==='empty'?'Trống':st==='calling'?'📢 Calling':st==='entered'?'🚛 Entered':st==='loading'?'⛽ Loading':st==='done'?'✅ Done':st==='wait'?'⏳ Wait':st;
    h += `<div class="st-card ${cls}">
      <div class="st-head">
        <span class="st-num">TRẠM ${i}</span>
        <span class="st-badge ${st}">${badgeTxt}</span>
      </div>`;
    if (st === 'empty') {
      h += `<div class="st-empty" style="padding:8px 10px">
        <input class="sinp" id="st-q-${i}" placeholder="Tìm xe: biển số, tài xế, DO, khách..." oninput="mStSearch(${i}, this.value)" style="margin:0">
        <div id="st-res-${i}" style="margin-top:8px"></div>
      </div>`;
    } else {
      h += `<div class="st-body">
        <div class="st-row"><span class="st-lbl">🚛 Biển số</span><span class="st-val">${esc(s.plate)}${s.rmooc ? ' <span style="color:var(--muted);font-weight:400">/ '+esc(s.rmooc)+'</span>' : ''}</span></div>
        <div class="st-row"><span class="st-lbl">🪪 Tài xế</span><span class="st-val">${esc(s.driver)}</span></div>
        <div class="st-row"><span class="st-lbl">🏢 Khách</span><span class="st-val">${esc(s.customer)}</span></div>
        <div class="st-row"><span class="st-lbl">📋 DO</span><span class="st-val">${esc(s.doNum || '—')}</span></div>
        <div class="st-row"><span class="st-lbl">🛢️ Tank</span><span class="st-val">${esc(s.tank || '—')} / ${esc(s.batch || '—')}</span></div>
        <div class="st-row"><span class="st-lbl">📦 KL Nạp</span><span class="st-val" style="color:${s.qty ? 'var(--green)' : 'var(--red)'}; font-size:14px">${s.qty ? stripTZ(s.qty) + ' MT' : '⚠ THIẾU'}</span></div>
      </div>
      <div class="st-actions">
        <button class="st-abtn" onclick="mCallDriver(${i})" oncontextmenu="event.preventDefault();mCallDriverPick(${i});return false" ontouchstart="mCallLongStart(${i})" ontouchend="mCallLongEnd()">📢 Gọi</button>
        ${(st==='calling'||st==='entered')?`<button class="st-abtn" style="background:rgba(16,185,129,.2);color:var(--green)" onclick="mStartLoad(${i})">▶ Start</button>`:''}
        ${(st==='loading')?`<button class="st-abtn" style="background:rgba(16,185,129,.2);color:var(--green)" onclick="mCompleteOpen(${i})">✅ Xong</button>`:''}
        <button class="st-abtn swap" onclick="mSwapOpen(${i})">🔄 Swap</button>
        <button class="st-abtn edit" onclick="mEditOpen(${i})">✏️ Sửa</button>
        <button class="st-abtn" style="background:rgba(239,68,68,.15);color:var(--red)" onclick="mEmptyOpen(${i})">🚫 Empty</button>
      </div>`;
    }
    h += '</div>';
  }
  el.innerHTML = h;
}

// Per-station search — delegate to existing mAssignSearch logic
function mStSearch(stId, q){
  const box = document.getElementById('st-res-'+stId);
  if(!box) return;
  let hidden = document.getElementById('assign-res');
  if(!hidden){ hidden=document.createElement('div'); hidden.id='assign-res'; hidden.style.display='none'; document.body.appendChild(hidden); }
  mAssignSearch(q);
  const matches = hidden._matches || [];
  // Replace the 4-button station picker with a single assign button per item
  let html = hidden.innerHTML;
  // Strip entire .asr-station-pick block from each item
  html = html.replace(/<div class="asr-station-pick">[\s\S]*?<\/div>\s*<\/div>/g, '</div>');
  box.innerHTML = html;
  box._matches = matches;
  // Append one assign button to each .asr-item in order
  const items = box.querySelectorAll('.asr-item');
  items.forEach((it, idx) => {
    const row = matches[idx]; if(!row) return;
    const hasQty = row.qty && parseFloat(row.qty) > 0;
    const btn = document.createElement('button');
    btn.className = 'asr-assign-btn';
    btn.textContent = '✓ Assign → Trạm ' + stId;

function mStAssignConfirm(stId, rowIdx, itemEl, btn){

  const hidden = document.getElementById('assign-res');

    btn.dataset.confirmed = '1';

async function mEmptyExec(stId) {
  const s = ST[stId] || {};
  const btn = document.getElementById('empty-confirm-btn');

  // Double-tap confirm
  if (btn && btn.dataset.confirmed !== '1') {
    btn.dataset.confirmed = '1';
    btn.style.background = 'rgba(239,68,68,.4)';
    btn.textContent = '⚠ Chạm lần nữa để xác nhận (5s)';
    mToast('⚠ Chạm lần nữa để xác nhận Empty', 'er');
    setTimeout(() => {
      if (btn.dataset.confirmed === '1') {
        btn.dataset.confirmed = '';
        btn.style.background = 'rgba(239,68,68,.2)';
        btn.textContent = '🚫 Xác nhận Empty';
      }
    }, 5000);
    return;
  }

  try {
    const savedDO = s.doNum || '';
    const savedPlate = s.plate || '';
    const savedDriver = s.driver || '';
    const savedOid = s._oid || '';

    // 1. Set station to empty
    await FD.ref('stations/' + stId).set({ status: 'empty' });

    // 2. Reset plan_today status so vehicle returns to queue
    if (savedDO) {
      const snap = await FD.ref('plan_today').once('value');
      const plan = snap.val();
      if (plan && Array.isArray(plan)) {
        let changed = false;
        plan.forEach(pr => {
          if (doMatch(pr.doNum, savedDO)) {
            if (pr._status && pr._status !== 'done' && pr._status !== 'cancel') {
              delete pr._status;
              changed = true;
            }
          }
        });
        if (changed) await FD.ref('plan_today').set(plan);
      }
    }

    // 3. Notify desktop
    engNotify('empty', '🚫 Empty Trạm ' + stId,
      (savedPlate || '—') + ' (' + (savedDriver || '—') + ')' +
      (savedDO ? '\nDO: ' + savedDO : '') +
      '\nXe quay lại hàng đợi');

    mModalClose('swap');
    mToast('🚫 Đã Empty Trạm ' + stId + ' — ' + savedPlate, 'ok');
  } catch (e) {
    mToast('❌ ' + e.message, 'er');
  }
}

async function mSwapExec(fromId, toId) {
  const a = { ...ST[fromId] };

  try {
    await FD.ref('stations/' + fromId).set(b.status ? b : { status: 'empty' });
    await FD.ref('stations/' + toId).set(a.status ? a : { status: 'empty' });
    // Push notification to desktop
    engNotify('swap', 'Swap Trạm ' + fromId + ' ↔ Trạm ' + toId,
      (a.plate||'—') + ' (' + (a.driver||'') + ') → Trạm ' + toId
      + (b.plate ? '\n' + b.plate + ' (' + (b.driver||'') + ') → Trạm ' + fromId : ''));
    mToast('✅ Swap: Trạm ' + fromId + ' ↔ Trạm ' + toId, 'ok');
  } catch (e) {
    mToast('❌ Lỗi: ' + e.message, 'er');
  }
  mModalClose('swap');
}

async function mEditSave() {
  const stId = _editStId;
  const s = ST[stId];
  if (!s) return;
  const gv = id => (document.getElementById(id).value || '').trim();

  const nQ = gv('me-qty');
  if (!parseFloat(nQ)) {
    mToast('⛔ Loading Qty không được trống!', 'er');
    document.getElementById('me-qty').style.borderColor = 'var(--red)';
    return;
  }

  const tkV = gv('me-tank');
  let nTk = s.tank || '', nBt = s.batch || '';
  if (tkV) { const tp = tkV.split('|'); nTk = tp[0] || ''; nBt = tp[1] || ''; }

  // ★ Capture old state BEFORE writing to Firebase (listener will overwrite ST[stId])
  const old = { plate: s.plate||'', rmooc: s.rmooc||'', driver: s.driver||'',
    customer: s.customer||'', doNum: s.doNum||'', qty: s.qty||'',
    tank: s.tank||'', batch: s.batch||'', type: s.type||'' };

  const updated = {
    ...s,
    plate: gv('me-plate'), rmooc: gv('me-rmooc'),
    driver: gv('me-driver'), customer: gv('me-cust'),
    doNum: gv('me-do'), qty: nQ, type: gv('me-type'),
    tank: nTk, batch: nBt
  };

  // Build change summary BEFORE Firebase write
  const changes = [];
  if (updated.plate !== old.plate) changes.push('Plate: ' + old.plate + ' → ' + updated.plate);
  if (updated.rmooc !== old.rmooc) changes.push('Rmooc: ' + (old.rmooc||'—') + ' → ' + (updated.rmooc||'—'));
  if (updated.driver !== old.driver) changes.push('Driver: ' + old.driver + ' → ' + updated.driver);
  if (updated.customer !== old.customer) changes.push('Cust: ' + old.customer + ' → ' + updated.customer);
  if (updated.doNum !== old.doNum) changes.push('DO: ' + (old.doNum||'—') + ' → ' + (updated.doNum||'—'));
  if (updated.qty !== old.qty) changes.push('Qty: ' + (old.qty||'—') + ' → ' + updated.qty + ' MT');
  if (updated.tank !== old.tank || updated.batch !== old.batch) changes.push('Tank: ' + old.tank + '/' + old.batch + ' → ' + updated.tank + '/' + updated.batch);
  if (updated.type !== old.type) changes.push('Type: ' + (old.type||'—') + ' → ' + (updated.type||'—'));

  if (!changes.length) {
    mToast('ℹ Không có thay đổi', 'ok');
    mModalClose('edit');
    return;
  }

  try {
    await FD.ref('stations/' + stId).set(updated);

    // Sync Today Plan if DO matches
    if (updated.doNum) {
      const snap = await FD.ref('plan_today').once('value');
      const plan = snap.val();
      if (plan && Array.isArray(plan)) {
        let changed = false;
        plan.forEach(pr => {
          if (doMatch(pr.doNum, updated.doNum)) {
            if (updated.plate) pr.plate = updated.plate;
            if (updated.driver) pr.driver = updated.driver;
            if (updated.qty) pr.qty = updated.qty;
            if (updated.rmooc) pr.romooc = updated.rmooc;
            if (updated.customer) pr.customer = updated.customer;
            changed = true;
          }
        });
        if (changed) await FD.ref('plan_today').set(plan);
      }
    }

    // Push notification to desktop
    engNotify('edit', 'Sửa Trạm ' + stId + ' — ' + (updated.plate||''), changes.join('\n'));
    mToast('💾 Đã cập nhật Trạm ' + stId + ' (' + changes.length + ' thay đổi)', 'ok');
  } catch (e) {
    mToast('❌ ' + e.message, 'er');
  }
  mModalClose('edit');
}

function fleetListen() {
  ['lt', 'dk', 'rm', 'dr'].forEach(tab => {
    FD.ref('fleet_' + tab).on('value', snap => {
      const v = snap.val();
      FLEET[tab] = v ? (Array.isArray(v) ? v : Object.values(v)) : [];
    });
  });
}

function _vnNorm(s){
  return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d').replace(/Đ/g,'d').toLowerCase().trim();
}
function mCertSearch(q) {
  const box = document.getElementById('cert-res');
  const qn = _vnNorm(q);
  if (qn.length < 2) { box.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:10px;text-align:center">Nhập ≥ 2 ký tự...</div>'; return; }

  const today = new Date(); today.setHours(0, 0, 0, 0);
  const results = [];

  function chk(row, fields, labels) {
    return fields.map((f, i) => {
      if (!row[f]) return null;
      try { const d = new Date(row[f]); return { lbl: labels[i], date: row[f], ok: d >= today }; }
      catch { return null; }
    }).filter(Boolean);
  }

  (FLEET.lt || []).forEach(r => {
    if (_vnNorm(r.plate).includes(qn))
      results.push({ type: '🚛', label: r.plate, sub: 'Xe liền thân', tab: 'lt', _id: r._id,
        certs: chk(r, ['d5','d6','d7','d8','d9','d10','d11'], ['Kiểm định bồn','Đăng kiểm','V/c nguy hiểm','Bảo hiểm','Van an toàn','ĐH áp','ĐH nhiệt']) });
  });
  (FLEET.dk || []).forEach(r => {
    if (_vnNorm(r.plate).includes(qn))
      results.push({ type: '🚜', label: r.plate, sub: 'Đầu kéo', tab: 'dk', _id: r._id,
        certs: chk(r, ['d3','d4','d5'], ['Đăng kiểm','V/c nguy hiểm','Bảo hiểm']) });
  });
  (FLEET.rm || []).forEach(r => {
    if (_vnNorm(r.plate).includes(qn))
      results.push({ type: '🔗', label: r.plate, sub: 'Rmooc', tab: 'rm', _id: r._id,
        certs: chk(r, ['d5','d6','d7','d8','d9','d10'], ['Kiểm định bồn','Đăng kiểm','V/c nguy hiểm','Van an toàn','ĐH áp','ĐH nhiệt']) });
  });
  (FLEET.dr || []).forEach(r => {
    if (_vnNorm(r.name).includes(qn))
      results.push({ type: '👤', label: r.name, sub: 'Tài xế', tab: 'dr', _id: r._id,
        certs: chk(r, ['d1','d2','d3'], ['Bằng lái','An toàn PCCC','V/c nguy hiểm']) });
  });

  if (!results.length) { box.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:10px;text-align:center">Không tìm thấy</div>'; return; }

  box.innerHTML = results.map(r => {
    const hasExp = r.certs.some(c => !c.ok);
    const icon = !r.certs.length ? '⚪' : hasExp ? '🔴' : '🟢';
    const tags = r.certs.map(c =>
      `<span class="cert-tag ${c.ok ? 'ok' : 'exp'}">${esc(c.lbl)} ${c.date} ${c.ok ? '✓' : '✗'}</span>`
    ).join('');
    return `<div class="cert-item" onclick="mCertEditOpen('${r.tab}',${r._id})">
      <div class="cert-name">${icon} ${r.type} ${esc(r.label)} <span class="cert-sub">${r.sub}</span></div>
      <div class="cert-tags">${tags || '<span style="color:var(--muted);font-size:10px">Chưa có chứng chỉ</span>'}</div>
    </div>`;
  }).join('');
}

// ═══ Cert Edit Modal ═══
const CERT_FIELDS = {
  lt: [{k:'d5',l:'Kiểm định bồn'},{k:'d6',l:'Đăng kiểm'},{k:'d7',l:'V/c nguy hiểm'},{k:'d8',l:'Bảo hiểm'},{k:'d9',l:'Van an toàn'},{k:'d10',l:'ĐH áp'},{k:'d11',l:'ĐH nhiệt'}],
  dk: [{k:'d3',l:'Đăng kiểm'},{k:'d4',l:'V/c nguy hiểm'},{k:'d5',l:'Bảo hiểm'}],
  rm: [{k:'d5',l:'Kiểm định bồn'},{k:'d6',l:'Đăng kiểm'},{k:'d7',l:'V/c nguy hiểm'},{k:'d8',l:'Van an toàn'},{k:'d9',l:'ĐH áp'},{k:'d10',l:'ĐH nhiệt'}],
  dr: [{k:'d1',l:'Bằng lái'},{k:'d2',l:'An toàn PCCC'},{k:'d3',l:'V/c nguy hiểm'}]
};

let _certTab = null, _certId = null;
function mCertEditOpen(tab, id) {
  _certTab = tab; _certId = Number(id);
  const row = (FLEET[tab] || []).find(r => Number(r._id) === _certId);
  if (!row) { mToast('Không tìm thấy', 'er'); return; }

  const title = tab === 'dr' ? '👤 ' + esc(row.name) : (tab === 'lt' ? '🚛 ' : tab === 'dk' ? '🚜 ' : '🔗 ') + esc(row.plate);
  const fields = CERT_FIELDS[tab] || [];
  const today = new Date(); today.setHours(0, 0, 0, 0);

  let h = `<div class="modal-title">${title}<button class="modal-close" onclick="mModalClose('cert-edit')">✕</button></div><div class="eform">`;
  fields.forEach(f => {
    const v = row[f.k] || '';
    const ok = v ? new Date(v) >= today : false;
    h += `<div>
      <label>${f.l} ${v ? (ok ? '✅' : '❌') : ''}</label>
      <input type="date" id="mce-${f.k}" value="${v}">
    </div>`;
  });
  h += `<button class="btn-save" onclick="mCertEditSave()">💾 LƯU</button>
    <button class="btn-cancel" onclick="mModalClose('cert-edit')">Đóng</button></div>`;

  document.getElementById('modal-cert-edit-body').innerHTML = h;
  document.getElementById('modal-cert-edit').classList.add('on');
}

async function mCertEditSave() {
  const row = (FLEET[_certTab] || []).find(r => Number(r._id) === _certId);
  if (!row) return;
  const fields = CERT_FIELDS[_certTab] || [];
  let changed = 0;
  fields.forEach(f => {
    const inp = document.getElementById('mce-' + f.k);
    if (inp) { const nv = inp.value.trim(); if (nv !== (row[f.k] || '')) { row[f.k] = nv; changed++; } }
  });
  if (changed) {
    try {
      await FD.ref('fleet_' + _certTab).set(FLEET[_certTab]);
      mToast('💾 Cập nhật ' + changed + ' chứng chỉ', 'ok');
      // Refresh search
      const q = document.getElementById('cert-q');
      if (q && q.value) mCertSearch(q.value);
    } catch (e) { mToast('❌ ' + e.message, 'er'); }
  } else mToast('Không có thay đổi', 'ok');
  mModalClose('cert-edit');
}

let PLAN_TODAY = [];

function planListen() {
  FD.ref('plan_today').on('value', snap => {
    const val = snap.val();
    PLAN_TODAY = val ? (Array.isArray(val) ? val : Object.values(val)) : [];
    if(document.getElementById('pg-plan')?.classList.contains('on')) mPlanRender();
  });
}

// ═══ Today Plan (read-only) ═══
function mPlanRender(){
  const list=document.getElementById('plan-list');
  const sum=document.getElementById('plan-summary');
  if(!list) return;
  const q=_vnNorm((document.getElementById('plan-q')||{}).value||'');
  const rows=(PLAN_TODAY||[]).filter(r=>r && (!q || _vnNorm(r.plate).includes(q)||_vnNorm(r.driver).includes(q)||_vnNorm(r.doNum).includes(q)||_vnNorm(r.customer).includes(q)));

  // Summary counts by status
  let nDone=0,nCancel=0,nAssigned=0,nPending=0,totalQty=0,doneQty=0;
  const assignedDOs=new Set();
  for(let i=1;i<=4;i++){const st=ST[i]||{};if(st.status&&st.status!=='empty'&&st.doNum)assignedDOs.add(normDO(st.doNum));}
  (PLAN_TODAY||[]).forEach(r=>{
    if(!r)return;
    const q=parseFloat(r.qty)||0; totalQty+=q;
    if(r._status==='done'){nDone++; doneQty+=q;}
    else if(r._status==='cancel') nCancel++;
    else if(r.doNum && assignedDOs.has(normDO(r.doNum))) nAssigned++;
    else nPending++;
  });
  sum.innerHTML =
    '<span>📋 Tổng: <b style="color:var(--txt)">'+(PLAN_TODAY||[]).length+'</b></span>'
    +'<span>⏳ Chờ: <b style="color:var(--accent)">'+nPending+'</b></span>'
    +'<span>⚡ Đang nạp: <b style="color:var(--purple)">'+nAssigned+'</b></span>'
    +'<span>✅ Xong: <b style="color:var(--green)">'+nDone+'</b></span>'
    +(nCancel?'<span>🚫 Hủy: <b style="color:var(--red)">'+nCancel+'</b></span>':'')
    +'<span>🛢️ <b style="color:var(--txt)">'+stripTZ(doneQty)+'/'+stripTZ(totalQty)+' MT</b></span>';

  if(!rows.length){list.innerHTML='<div style="color:var(--muted);font-size:12px;padding:16px;text-align:center">Không có dữ liệu</div>';return;}

  list.innerHTML=rows.map(r=>{
    const q=parseFloat(r.qty)||0;
    let stLbl='',stCol='var(--muted)';
    const doN=normDO(r.doNum);
    if(r._status==='done'){stLbl='✅ DONE'; stCol='var(--green)';}
    else if(r._status==='cancel'){stLbl='🚫 HỦY'; stCol='var(--red)';}
    else if(doN && assignedDOs.has(doN)){
      const atSt=Object.entries(ST).find(([,st])=>st.doNum&&normDO(st.doNum)===doN);
      stLbl='⚡ TRẠM '+(atSt?atSt[0]:'?'); stCol='var(--purple)';
    } else {stLbl='⏳ CHỜ'; stCol='var(--accent)';}
    const rmooc=r.romooc||r.rmooc||'';
    const custShort=(r.customer||'—').replace(/\s*\([^)]*\)\s*/g,'').trim()||(r.customer||'—');
    return '<div class="asr-item" style="margin-bottom:6px">'
      +'<div class="asr-head" style="display:flex;justify-content:space-between;align-items:center">'
        +'<span><span class="asr-plate">'+esc(r.plate||'—')+'</span> <span class="asr-driver">'+esc(r.driver||'—')+'</span></span>'
        +'<span style="font-size:9px;font-weight:700;color:'+stCol+';letter-spacing:.5px">'+stLbl+'</span>'
      +'</div>'
      +'<div class="asr-cust">'+esc(custShort)+'</div>'
      +'<div class="asr-meta">'
        +(q>0?'<span class="asr-tag qty">🛢️ '+stripTZ(q)+' MT</span>':'<span class="asr-tag noqty">⚠ THIẾU QTY</span>')
        +(r.doNum?'<span class="asr-tag do">📋 '+esc(r.doNum)+'</span>':'<span class="asr-tag warn">⚠ NO DO</span>')
        +(rmooc?'<span class="asr-tag do">🔗 '+esc(rmooc)+'</span>':'')
        +(r.type?'<span class="asr-tag type">'+esc(r.type)+'</span>':'')
        +(r.allowLoad==='NO'?'<span class="asr-tag warn">⛔ Load=NO</span>':'')
      +'</div>'
      +(r.note?'<div style="background:rgba(46,139,255,.08);border:1px solid rgba(46,139,255,.15);border-radius:6px;padding:5px 8px;margin-top:5px;font-size:10.5px;color:var(--accent)">★ '+esc(r.note)+'</div>':'')
    +'</div>';
  }).join('');
}

function mAssignSearch(q) {
  const box = document.getElementById('assign-res');
  const qn = _vnNorm(q);
  if (qn.length < 2) { box.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:10px;text-align:center">Nhập ≥ 2 ký tự (biển số, tài xế, DO, khách hàng)...</div>'; return; }

  const assignedDOs = new Set();
  for (let i = 1; i <= 4; i++) { const st = ST[i]||{}; if (st.status&&st.status!=='empty'&&st.doNum) assignedDOs.add(normDO(st.doNum)); }

  const textMatches = PLAN_TODAY.filter(r =>
    _vnNorm(r.plate).includes(qn)||_vnNorm(r.driver).includes(qn)
    ||_vnNorm(r.doNum).includes(qn)||_vnNorm(r.customer).includes(qn));

  const matches=[], excluded=[];
  textMatches.forEach(r => {
    const doNorm=normDO(r.doNum);
    if(doNorm&&assignedDOs.has(doNorm)){const atSt=Object.entries(ST).find(([,st])=>st.doNum&&normDO(st.doNum)===doNorm);excluded.push('⚡ '+(r.plate||'')+' đang ở Trạm '+(atSt?atSt[0]:'?'));}
    else if(r._status==='done') excluded.push('✅ '+(r.plate||'')+' đã hoàn thành');
    else if(r._status==='cancel') excluded.push('🚫 '+(r.plate||'')+' đã hủy');
    else if(r.allowLoad==='NO') excluded.push('⛔ '+(r.plate||'')+' Load = NO');
    else matches.push(r);
  });

  if(!matches.length&&!excluded.length){box.innerHTML='<div style="color:var(--muted);font-size:12px;padding:10px;text-align:center">Không tìm thấy trong kế hoạch hôm nay</div>';return;}

  const availSt=[];
  for(let i=1;i<=4;i++){const st=ST[i]||{};availSt.push({id:i,empty:!st.status||st.status==='empty',label:st.status==='empty'?'Trống':esc(st.plate)});}

  // Cargo flags
  function _flags(type){
    const t=(type||'').toLowerCase(),f=[];
    if(/30[\s:]*70|70[\s:]*30/.test(t)) f.push('30:70');
    if(/40[\s:]*60|60[\s:]*40/.test(t)) f.push('40:60');
    if(/pure\s*c3|thuần\s*c3|propane/i.test(type)) f.push('⚠ PURE C3');
    else if(/pure\s*c4|thuần\s*c4|butane/i.test(type)) f.push('⚠ PURE C4');
    else if(/pure|thuần|thuan/i.test(type)) f.push('⚠ PURE');
    if(!/pure|thuần/i.test(type)&&/\bc4\b/i.test(t)) f.push('⚠ C4');
    return f;
  }
  // Cert check
  function _certWarn(plate,rmooc,driver){
    const w=[];const td=new Date();td.setHours(0,0,0,0);
    const pl=(plate||'').trim().toUpperCase(),rm=(rmooc||'').trim().toUpperCase(),dr=(driver||'').trim();
    function chk(row,fields,labels,vl){
      fields.forEach((f,i)=>{if(row[f]){try{const d=new Date(row[f]);if(!isNaN(d.getTime())&&d<td)w.push({v:vl,cert:labels[i],date:row[f]});}catch(e){}}});
    }
    if(rm){
      const dk=(FLEET.dk||[]).find(r=>(r.plate||'').trim().toUpperCase()===pl);
      if(dk)chk(dk,['d3','d4','d5'],['Đăng kiểm','V/c nguy hiểm','Bảo hiểm'],pl+' Đầu kéo');
      const rmR=(FLEET.rm||[]).find(r=>(r.plate||'').trim().toUpperCase()===rm);
      if(rmR)chk(rmR,['d5','d6','d7','d8','d9','d10'],['KĐ bồn','Đăng kiểm','V/c nguy hiểm','Van AT','ĐH áp','ĐH nhiệt'],rm+' Rmooc');
    }else if(pl){
      const lt=(FLEET.lt||[]).find(r=>(r.plate||'').trim().toUpperCase()===pl);
      if(lt)chk(lt,['d5','d6','d7','d8','d9','d10','d11'],['KĐ bồn','Đăng kiểm','V/c nguy hiểm','Bảo hiểm','Van AT','ĐH áp','ĐH nhiệt'],pl+' Xe LT');
    }
    if(dr){
      const drR=(FLEET.dr||[]).find(r=>(r.name||'').trim().toLowerCase()===dr.toLowerCase());
      if(drR)chk(drR,['d1','d2','d3'],['Bằng lái','PCCC','V/c nguy hiểm'],dr+' Tài xế');
    }
    return w;
  }

  let h='';
  matches.forEach((r,idx)=>{
    const hasQty=r.qty&&parseFloat(r.qty)>0;
    const rmooc=r.romooc||r.rmooc||'';
    const flags=_flags(r.type||'');
    const certs=_certWarn(r.plate,rmooc,r.driver);
    const warns=r._warnings||[];
    const notInWMS=warns.some(w=>w.code==='DO_NOT_IN_WMS');

    let certHtml='';
    if(certs.length){
      // Group by vehicle/subject (c.v) to avoid repeating "61R-06388 Rmooc:" on every line
      const grp={};
      certs.forEach(c=>{ (grp[c.v]=grp[c.v]||[]).push(c); });
      certHtml='<div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:6px;padding:5px 8px;margin-top:5px;font-size:10.5px;color:var(--red);line-height:1.35">';
      Object.keys(grp).forEach(v=>{
        const items=grp[v].map(c=>'<b>'+esc(c.cert)+'</b> '+esc(c.date)).join(' · ');
        certHtml+='⚠ '+esc(v)+': '+items+'<br>';
      });
      certHtml+='</div>';
    }
    let noteHtml=r.note?'<div style="background:rgba(46,139,255,.08);border:1px solid rgba(46,139,255,.15);border-radius:6px;padding:6px 10px;margin-top:6px;font-size:11px;color:var(--accent)">★ '+esc(r.note)+'</div>':'';
    let flagsHtml=flags.map(f=>'<span class="asr-tag warn">'+f+'</span>').join('');

    h+=`<div class="asr-item" ${certs.length?'style="border-color:rgba(239,68,68,.4)"':''}>
      <div class="asr-head">
        <span class="asr-plate">${esc(r.plate||'—')}</span>
        <span class="asr-driver">${esc(r.driver||'—')}</span>
      </div>
      <div class="asr-cust">${esc(r.customer||'—')}</div>
      <div class="asr-meta">
        ${hasQty?'<span class="asr-tag qty">🛢️ '+stripTZ(r.qty)+' MT</span>':'<span class="asr-tag noqty">⚠ THIẾU QTY</span>'}
        ${r.doNum?'<span class="asr-tag do">📋 '+esc(r.doNum)+'</span>':'<span class="asr-tag warn">⚠ NO DO</span>'}
        ${flagsHtml}
        ${rmooc?'<span class="asr-tag do">🔗 '+esc(rmooc)+'</span>':''}
        ${notInWMS?'<span class="asr-tag noqty">🔴 Not in WMS</span>':''}
      </div>
      ${noteHtml}
      ${certHtml}
      <div class="asr-station-pick">
        ${availSt.map(st=>
          `<button class="asr-st-btn ${st.empty?'avail':''}" onclick="mAssignExec(${idx},${st.id})" ${!hasQty?'disabled style="opacity:.4"':''}>
            ${st.id}${st.empty?'':`<br><span style="font-size:8px;font-family:Barlow">${st.label}</span>`}
          </button>`
        ).join('')}
      </div>
    </div>`;
  });

  if(excluded.length){
    h+='<div style="margin-top:6px;padding:8px;border-radius:8px;background:rgba(255,255,255,.03)">';
    h+='<div style="font-size:9px;color:var(--muted);font-weight:700;margin-bottom:4px;letter-spacing:.5px">KHÔNG KHẢ DỤNG</div>';
    excluded.forEach(e=>{h+='<div class="asr-excluded">'+e+'</div>';});
    h+='</div>';
  }
  box.innerHTML=h;
  box._matches=matches;
}


async function mAssignExec(rowIdx, stId) {
  const box = document.getElementById('assign-res');
  const matches = box._matches;
  if (!matches || !matches[rowIdx]) return;
  const row = matches[rowIdx];

  // Validate qty
  if (!row.qty || !parseFloat(row.qty)) {
    mToast('⛔ THIẾU Loading Qty — không thể assign!', 'er');
    return;
  }

  // Check station not occupied (or confirm override)
  const curSt = ST[stId] || {};
  if (curSt.status && curSt.status !== 'empty') {
    if (!confirm('Trạm ' + stId + ' đang có ' + (curSt.plate || '—') + '. Ghi đè?')) return;
  }

  // Get active tank from TK_CFG
  let tankName = '', tankBatch = '';
  ['tk1', 'tk2'].forEach(k => {
    const cfg = TK_CFG[k] || {};
    if (cfg.selected) {
      const num = k === 'tk1' ? '3501' : '3502';
      tankName = 'TK-' + num;
      tankBatch = cfg.lot ? 'LPG-' + new Date().getFullYear() + '-' + cfg.lot : '';
    }
  });
  if (!tankName) {
    // Fallback: use first tank with lot
    ['tk1', 'tk2'].forEach(k => {
      const cfg = TK_CFG[k] || {};
      if (cfg.lot && !tankName) {
        const num = k === 'tk1' ? '3501' : '3502';
        tankName = 'TK-' + num;
        tankBatch = 'LPG-' + new Date().getFullYear() + '-' + cfg.lot;
      }
    });
  }

  const data = {
    status: 'calling',
    plate: row.plate || '',
    rmooc: row.romooc || row.rmooc || '',
    driver: row.driver || '',
    customer: row.customer || '',
    doNum: row.doNum || '',
    _oid: row._oid || '',
    qty: row.qty || '',
    type: row.type || '',
    note: row.note || '',
    tank: tankName,
    batch: tankBatch,
    turn: 0,
    tech: {},
    certWarn: '',
    _multiDO: false,
    _linkedRows: null
  };

  try {
    await FD.ref('stations/' + stId).set(data);

    // Update plan status
    if (row.doNum) {
      const snap = await FD.ref('plan_today').once('value');
      const plan = snap.val();
      if (plan && Array.isArray(plan)) {
        plan.forEach(pr => {
          if (doMatch(pr.doNum, row.doNum)) pr._status = 'entered';
        });
        await FD.ref('plan_today').set(plan);
      }
    }

    // Short customer: strip "( ... )" parenthetical branch/suffix
    var custShort = (row.customer||'—').replace(/\s*\([^)]*\)\s*/g,'').trim() || (row.customer||'—');
    engNotify('assign', 'Assign → Trạm ' + stId,
      (row.plate||'—') + ' · ' + (row.driver||'—') + '\n' +
      custShort + ' · ' + stripTZ(row.qty) + ' MT' +
      (row.doNum ? '\nDO: ' + row.doNum : ''));

    mToast('✅ ' + row.plate + ' → Trạm ' + stId, 'ok');
    // Clear per-station search box (pg-assign removed in v2)
    var _qIn=document.getElementById('st-q-'+stId); if(_qIn) _qIn.value='';
    var _resBox=document.getElementById('st-res-'+stId); if(_resBox) _resBox.innerHTML='';
    var _hidden=document.getElementById('assign-res'); if(_hidden) _hidden.innerHTML='';
    renderStations();
  } catch (e) {
    mToast('❌ ' + e.message, 'er');
  }
}

// ENGINEER NOTIFICATION — Push to Firebase for desktop to show

function engNotify(type, title, detail) {
  const key = 'eng_' + Date.now();
  FD.ref('eng_notify/' + key).set({
    type: type,       // 'swap' | 'edit' | 'assign'
    title: title,
    detail: detail,
    ts: Date.now(),
    device: localStorage.getItem('ap_device_id') || 'mobile',
    confirmed: false
  }).catch(e => console.warn('engNotify:', e));
}
